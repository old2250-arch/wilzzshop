<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitalpedia Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #0088cc;
            --whatsapp-color: #25d366;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            text-align: center;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            margin-bottom: 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            font-weight: 600;
        }

        p {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .link-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
        }

        .link-card:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .link-card i {
            font-size: 24px;
            margin-right: 15px;
            width: 30px;
        }

        .link-text {
            text-align: left;
            flex-grow: 1;
        }

        .link-text span {
            display: block;
            font-weight: 600;
            font-size: 1rem;
        }

        .link-text small {
            font-size: 0.75rem;
            opacity: 0.7;
        }

        /* Brand Colors */
        .btn-web { border-left: 5px solid #fff; }
        .btn-h2h { border-left: 5px solid #ffcc00; }
        .btn-tg { border-left: 5px solid var(--primary-color); }
        .btn-wa { border-left: 5px solid var(--whatsapp-color); }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-img">
        <i class="fas fa-shopping-cart"></i>
    </div>
    
    <h1>Digitalpedia ID</h1>
    <p>Solusi Nokos, PPOB & Integrasi H2H Terpercaya</p>

    <a href="https://www.orderhostid.my.id" class="link-card btn-web" target="_blank">
        <i class="fas fa-globe"></i>
        <div class="link-text">
            <span>Order Nokos & PPOB</span>
            <small>www.orderhostid.my.id</small>
        </div>
        <i class="fas fa-chevron-right" style="font-size: 12px;"></i>
    </a>

    <a href="https://digitalpediah2h.orderhostid.my.id" class="link-card btn-h2h" target="_blank">
        <i class="fas fa-server"></i>
        <div class="link-text">
            <span>Integrasi H2H</span>
            <small>digitalpediah2h.orderhostid.my.id</small>
        </div>
        <i class="fas fa-chevron-right" style="font-size: 12px;"></i>
    </a>

    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 25px 0;">

    <a href="https://t.me/CsDigitalpedia" class="link-card btn-tg" target="_blank">
        <i class="fab fa-telegram"></i>
        <div class="link-text">
            <span>Customer Service Telegram</span>
            <small>@CsDigitalpedia</small>
        </div>
    </a>

    <a href="https://wa.me/6283176421343" class="link-card btn-wa" target="_blank">
        <i class="fab fa-whatsapp"></i>
        <div class="link-text">
            <span>Hubungi via WhatsApp</span>
            <small>+62 831-7642-1343</small>
        </div>
    </a>

    <div class="footer">
        &copy; 2024 Digitalpedia. All Rights Reserved.
    </div>
</div>

</body>
</html>
